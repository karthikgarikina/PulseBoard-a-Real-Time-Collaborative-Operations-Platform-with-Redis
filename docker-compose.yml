services:
  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: .
    command: uvicorn app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000}
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python -m app.worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    build: .
    command: python -m app.scheduler
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  subscriber:
    build: .
    command: python -m app.subscriber
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
